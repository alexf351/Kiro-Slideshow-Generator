  :root {
    --bg: #000000;
    --ink: #FFFFFF;
    --ink-muted: #A0A6B8;
    --ink-faint: #5A6378;
    --accent: #00E5FF;
    --box-bg: rgba(28, 32, 44, 0.92);
    --box-border: rgba(255,255,255,0.06);
    --box-icon: #6B7280;
    --page-w: 1080px;
    --page-h: 1920px;
  }
  html, body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; color: var(--ink); }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 96px 0 40px 0; }
  /* When the actual visible viewport is narrower than the slide design width
     (e.g. inside a srcDoc iframe on iOS Safari, where the <meta viewport
     width=1080> sometimes gets dropped), shrink the whole stage so the
     1080-wide .slide elements fit. CSS zoom — unlike transform: scale —
     also collapses the layout box, so we don't get phantom horizontal
     scrollbars. No-op on desktop because of the max-width gate, and a
     no-op on mobile when the viewport meta IS honoured (100vw == 1080px →
     zoom == 1). */
  @media (max-width: 1100px) {
    .stage { zoom: calc(100vw / 1080px); }
  }
  .slide { position: relative; width: var(--page-w); height: var(--page-h); background: var(--bg); overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); color: var(--ink); }
  .bg-mascot { position: absolute; top: 48%; left: 50%; width: 1200px; height: 1200px; transform: translate(-50%, -50%); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.85; pointer-events: none; }
  .bg-photo { position: absolute; inset: 0; background-size: cover; background-position: center; background-repeat: no-repeat; pointer-events: none; }
  .bg-photo-scrim { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.15) 25%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.85) 90%, rgba(0,0,0,1) 100%); pointer-events: none; }
  /* Solid fallback for photo-first presets (e.g. pain_story) when no
     background is supplied. Sits where .bg-mascot would sit in the
     prompt-pack flow but stays neutral. */
  .bg-solid { position: absolute; inset: 0; background: #0a0a12; }

  /* ============================================================

  .preset-pain-story .frame { padding: 200px 100px 220px 100px; display: flex; align-items: center; justify-content: center; }

  /* ============================================================
     PRESET: meme_pov
     Image-dominant. Each panel is a full-bleed photo with chunky
     all-caps captions floating top and bottom. Caption legibility
     comes from a thick black stroke + drop shadow rather than a
     scrim, so the meme image stays uncovered.
     ============================================================ */
  .preset-meme-pov .frame { padding: 0; }
  /* Override the global photo scrim — the meme aesthetic is "photo
     visible, text on top". The caption's own stroke + shadow handle
     contrast. */
  .preset-meme-pov .bg-photo-scrim { display: none; }
  .preset-meme-pov .meme-caption {
    position: absolute; left: 0; right: 0;
    padding: 0 80px;
    text-align: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 110px; font-weight: 900; line-height: 1.04;
    color: #fff; text-transform: uppercase;
    letter-spacing: -0.005em;
    /* paint-order keeps the stroke outside the glyph instead of
       eating into it — the classic Impact-style meme silhouette. */
    -webkit-text-stroke: 8px #000;
    paint-order: stroke fill;
    text-shadow: 0 6px 16px rgba(0,0,0,0.85);
  }
  /* Captions positioned to clear the TikTok safe zone (top 14%, bottom
     24%, sides 12% on a 1080×1920 canvas). Slightly less classic-meme
     than edge-pinned text, but ensures the captions aren't obscured by
     TikTok's username / caption / action-button overlays. */
  .preset-meme-pov .meme-top { top: 290px; }
  .preset-meme-pov .meme-bottom { bottom: 500px; }
  .preset-meme-pov .meme-watermark {
    /* Keep watermark inside the safe band too — anchored just above
       the bottom obstruction zone instead of at the very edge. */
    position: absolute; bottom: 480px; right: 80px;
    font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 700;
    letter-spacing: 0.18em; color: rgba(255,255,255,0.85);
    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  }
  /* ============================================================
     PRESET: aspirational
     Cinematic luxury format. Bold sans-serif anchored to the
     bottom-left of the slide so the photo (yacht, summit, view,
     etc.) breathes at the top. Two accent colors: gold (#FFC857)
     for status words via <strong>, cyan (#00E5FF) for outcome

     ============================================================ */
  .preset-aspirational .frame {
    padding: 200px 90px 240px 90px;
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: flex-start;
    text-align: left;

  /* Photo visible at the top, deep dark at the bottom where the
     copy lives. Overrides the global photo scrim within this
     preset only. */
  .preset-aspirational .bg-photo-scrim {
    background: linear-gradient(180deg,
      rgba(0,0,0,0.18) 0%,
      rgba(0,0,0,0.08) 28%,
      rgba(0,0,0,0.45) 62%,
      rgba(0,0,0,0.92) 100%);

  /* Solid-fallback variant: when no photo is set we still want the

  .preset-aspirational .bg-solid {

  .preset-aspirational .asp-hook {

    text-shadow: 0 4px 28px rgba(0,0,0,0.65);

  .preset-aspirational .asp-supporting {

  .preset-aspirational .asp-text strong,

  .preset-aspirational .asp-cta-headline strong {

  /* Aspirational CTA — "luxury stamp" treatment.
     Centered composition framed by gold rules, brand name set as a
     trophy-style display lockup. Reads like a watch-brand label or a
     limited-edition sleeve, not a generic search prompt. */
  .preset-aspirational.slide-cta .frame {

    justify-content: center; align-items: center; text-align: center;

    text-transform: uppercase; color: #FFC857;

    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }
  .preset-aspirational .asp-cta-rule {

  .preset-aspirational .asp-cta-search {

    font-size: 168px; font-weight: 900;
    letter-spacing: -0.04em; color: #fff;

     also renders the Iro app icon (.has-app-icon on the .asp-cta

  .preset-aspirational .asp-cta-search { position: relative; }
  .preset-aspirational .asp-cta-search::after {
    content: ''; position: absolute; left: 50%; bottom: -12px;

    width: 64px; height: 4px; background: #00E5FF;
    box-shadow: 0 0 24px rgba(0,229,255,0.7);

  /* Wrapper around the CTA contents — needed so the .has-app-icon
     modifier can scope CSS to its descendants. flex-column keeps the
     children stacking centered exactly as they did when they were
     direct children of .frame. */
  .preset-aspirational .asp-cta {
    display: flex; flex-direction: column;
    align-items: center; text-align: center; width: 100%;

  .preset-aspirational .asp-cta.has-app-icon .asp-cta-search::after { display: none; }
  /* Iro app icon — the trust signal in the brand stamp lockup.

  .preset-aspirational .asp-cta-app-icon {

    margin: 0 auto;
    border-radius: 30px;

  .preset-aspirational .asp-cta.icon-under .asp-cta-app-icon { margin-top: 36px; }
  .preset-aspirational .asp-cta.icon-over  .asp-cta-app-icon { margin-bottom: 28px; }
  .preset-aspirational .asp-cta.icon-beside .asp-cta-app-icon { margin: 0; }
  /* "beside" pairs the icon and the brand wordmark in a single

  .preset-aspirational .asp-cta-stamp-row {

  .preset-aspirational .asp-cta-meta {

  /* ============================================================
     PRESET: product_demo
     Phone mockup with a real product screenshot inside, framed by

  .preset-product-demo .product-headline {

    width: 320px; height: 680px;

      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><path d="m6 9 6 6 6-6"></path><path d="M5 21h14"></path></svg>
      <span id="dl-btn-label">Download all slides</span>
    </button>
  </div>
</div>

<!-- ============================================================
     PASTE PANEL — paste JSON from Barry/Claude here, click Render
     ============================================================ -->
<div class="paste-panel" id="paste-panel">
  <div class="paste-header" onclick="togglePastePanel()">
    <div class="paste-title">📋 Paste new slideshow</div>
    <button class="paste-toggle" id="paste-toggle">−</button>
  </div>
  <div class="paste-body">
    <div class="paste-instructions">
      Paste the <code>SLIDES</code> JSON from Barry or Claude below. Wrapping (<code>const SLIDES =</code> / <code>;</code>) is optional — the engine handles it either way.
    </div>
    <textarea class="paste-textarea" id="paste-input" spellcheck="false" placeholder='Paste JSON here. Either:

{
  "platform": "chatgpt",
  "mascot": "platinum",
  "hook": { ... },
  "prompts": [ ... ],
  "cta": { ... },
  "attribution": "@tryiro"
}

— or —

const SLIDES = {
  platform: "chatgpt",
  mascot: "platinum",
  hook: { ... },
  ...
};

platform is REQUIRED. Valid: chatgpt, claude.
mascot is optional. Valid: bronze, silver, gold, platinum, diamond, iridescent.'></textarea>
    <div class="paste-actions">
      <button class="paste-btn" onclick="loadPastedSlides()">Render Slides</button>
      <button class="paste-btn secondary" onclick="resetSlides()" title="Reset to default">↺</button>
    </div>
    <div class="paste-status" id="paste-status"></div>
  </div>
</div>

<div class="stage" id="stage"></div>

<script>
// ============================================================
// RENDERER — do not edit below this line unless changing layout
// ============================================================
const PLUS_SVG = `<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const MIC_SVG = `<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
const SEND_SVG = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;

// Preset registry. Each preset is a self-contained format — its own slide
// structure, its own builders, its own wrapper rules. Adding a new format
// means adding an entry here, not branching inside the existing renderer.
//
// `prompt_pack` is the original Iro format. The buildHook / buildPrompt /
// buildCTA functions below are referenced unchanged so the trusted format
// keeps rendering byte-for-byte the same.
const PRESETS = {
  prompt_pack: {
    label: 'Prompt Pack',
    slideClass: '',
    showCounter: true,
    // 'mascot' = fall back to the bouncy mascot bg + vignette when a slide
    // has no explicit `bg`. 'photo' = solid dark fallback (no mascot).
    fallbackBg: 'mascot',
    buildSlides(S) {
      const out = [];
      out.push({ html: buildHook(S.hook), bg: S.hook && S.hook.bg });
      (S.prompts || []).forEach((p) => {
        out.push({ html: buildPrompt(p, S.attribution, S.platform), bg: p.bg });
      });
      out.push({ html: buildCTA(S.cta, S.pathContext), bg: S.cta && S.cta.bg });
      return out;
    },
  },
  pain_story: {
    label: 'Pain Story',
    slideClass: 'preset-pain-story',
    showCounter: false,
    fallbackBg: 'photo',
    buildSlides(S) {
      const out = [];
      // `S.background` is a single shared photo URL/dataURL applied to every
      // slide that doesn't define its own — keeps a confession-style story
      // visually unified across beats.
      const shared = S.background;
      out.push({
        html: buildPainText(S.hook, 'hook'),
        bg: (S.hook && S.hook.bg) || shared,
      });
      (S.beats || []).forEach((b) => {
        out.push({
          html: buildPainText(b, 'beat'),
          bg: (b && b.bg) || shared,
        });
      });
      out.push({
        html: buildPainCTA(S.cta, S.attribution),
        bg: (S.cta && S.cta.bg) || shared,
      });
      return out;
    },
  },
  meme_pov: {
    label: 'Meme / POV',
    slideClass: 'preset-meme-pov',
    showCounter: false,
    fallbackBg: 'photo',
    buildSlides(S) {
      const out = [];
      // Each panel is an independent meme — its own image + its own
      // top/bottom captions. No shared background, no hook slide. CTA
      // is optional (meme posts often skip it entirely).
      (S.panels || []).forEach((p) => {
        out.push({
          html: buildMemePanel(p, S.attribution),
          bg: p && p.bg,
        });
      });
      if (S.cta) {
        out.push({
          html: buildMemeCTA(S.cta, S.attribution),
          bg: (S.cta && S.cta.bg) || (S.panels && S.panels[0] && S.panels[0].bg),
        });
      }
      return out;
    },
  },
  checklist: {
    label: 'Checklist',
    slideClass: 'preset-checklist',
    showCounter: false,
    fallbackBg: 'photo',
    buildSlides(S) {
      const out = [];
      out.push({
        html: buildChecklistHook(S.hook),
        bg: (S.hook && S.hook.bg) || S.background,
      });
      (S.items || []).forEach((it) => {
        out.push({
          html: buildChecklistItem(it),
          bg: (it && it.bg) || S.background,
        });
      });
      out.push({
        html: buildChecklistCTA(S.cta, S.attribution),
        bg: (S.cta && S.cta.bg) || S.background,
      });
      return out;
    },
  },
  handwritten_pack: {
    label: 'Handwritten Pack',
    slideClass: 'preset-handwritten-pack',
    showCounter: false,
    // Always solid paper background — bg-photo / mascot are explicitly
    // hidden in the preset's CSS. fallbackBg: 'photo' keeps the
    // wrapper logic simple (slide.bg is null for every slide), so the
    // .bg-solid layer renders unconditionally.
    fallbackBg: 'photo',
    buildSlides(S) {
      const out = [];
      out.push({ html: buildHandwrittenHook(S.hook), bg: null });
      (S.prompts || []).forEach((p) => {
        out.push({ html: buildHandwrittenPrompt(p), bg: null });
      });
      out.push({ html: buildHandwrittenCTA(S.cta, S.attribution), bg: null });
      return out;
    },
  },
  product_demo: {
    label: 'Product Demo',
    slideClass: 'preset-product-demo',
    showCounter: false,
    // Branded gradient runs as the slide background regardless. The
    // user-supplied images go inside the phone mockup, not under it.
    fallbackBg: 'photo',
    buildSlides(S) {
      const out = [];
      out.push({
        html: buildProductHook(S.hook),
        // Force the fallback path so the brand gradient renders, even
        // if the user accidentally set a hook bg via the picker (which
        // will be re-purposed as the screenshot inside the mockup).
        bg: null,
      });
      (S.features || []).forEach((f) => {
        out.push({
          html: buildProductFeature(f),
          bg: null,
        });
      });
      out.push({
        html: buildProductCTA(S.cta, S.attribution),
        bg: null,
      });
      return out;
    },
  },
  aspirational: {
    label: 'Aspirational',
    slideClass: 'preset-aspirational',
    showCounter: false,
    fallbackBg: 'photo',
    buildSlides(S) {
      const out = [];
      // Shared cinematic background runs across every slide unless an
      // individual one overrides — gives the whole story a consistent
      // luxury vibe.
      const shared = S.background;
      out.push({
        html: buildAspirationalHook(S.hook),
        bg: (S.hook && S.hook.bg) || shared,
      });
      (S.beats || []).forEach((b) => {
        out.push({
          html: buildAspirationalBeat(b),
          bg: (b && b.bg) || shared,
        });
      });
      out.push({
        html: buildAspirationalCTA(S.cta, S.attribution),
        bg: (S.cta && S.cta.bg) || shared,
      });
      return out;
    },
  },
  app_stack: {
    label: 'App Stack',
    slideClass: 'preset-app-stack',
    showCounter: true,
    fallbackBg: 'photo',
    buildSlides(S) {
      const out = [];
      const shared = S.background;
      out.push({
        html: buildAppStackHook(S.hook),
        bg: (S.hook && S.hook.bg) || shared,
      });
      (S.apps || []).forEach((a) => {
        out.push({
          html: buildAppStackApp(a, S.attribution),
          bg: (a && a.bg) || shared,
        });
      });
      return out;
    },
  },
};

function render() {
  // Any cached files from a previous "tap again to save" reflect the OLD
  // slides; invalidate now so the next save tap captures fresh.
  pendingShareFiles = null;
  const stage = document.getElementById('stage');

  const presetKey = (SLIDES.preset && PRESETS[SLIDES.preset]) ? SLIDES.preset : 'prompt_pack';
  const preset = PRESETS[presetKey];
  const slides = preset.buildSlides(SLIDES);

  const total = slides.length;
  slides.forEach(({ html: slideHTML, bg }, i) => {
    const slide = document.createElement('div');
    const isCTA = i === total - 1;
    const cls = ['slide'];
    if (preset.slideClass) cls.push(preset.slideClass);
    if (isCTA) cls.push('slide-cta');
    slide.className = cls.join(' ');

    let bgLayer;
    if (typeof bg === 'string' && bg.length > 0) {
      // Escape single quotes so a URL with a quote can't break the inline style.
      const safeBg = bg.replace(/'/g, "\\'");
      bgLayer = `<div class="bg-photo" style="background-image: url('${safeBg}')"></div>
                 <div class="bg-photo-scrim"></div>`;
    } else if (preset.fallbackBg === 'mascot') {
      const mascotKey = SLIDES.mascot || 'platinum';
      const mascotUrl = MASCOTS[mascotKey] || MASCOTS.platinum;
      bgLayer = `<div class="bg-mascot" style="background-image: url('${mascotUrl}')"></div>
                 <div class="bg-vignette"></div>`;
    } else {
      // Photo-first preset with no photo set yet — a solid dark fallback
      // keeps text legible without dragging the mascot in (it would clash
      // with editorial typography in formats like pain_story).
      bgLayer = `<div class="bg-solid"></div>
                 <div class="bg-photo-scrim"></div>`;
    }

    const counterHtml = preset.showCounter ? `<div class="top-counter">${i+1} / ${total}</div>` : '';

    slide.innerHTML = `
      ${bgLayer}
      ${counterHtml}
      <div class="frame">${slideHTML}</div>
    `;
    stage.appendChild(slide);
  });
}

function buildHook(h) {
  // Count visible text length (strip HTML tags for sizing math)
  const visibleLength = h.headline.replace(/<[^>]+>/g, '').length;
  // Default 128px, shrink for longer hooks. Tested ranges:
  //   <40 chars  → 128px (e.g. "7 ChatGPT Prompts Every AI Beginner Should Save" = 47 chars actually)
  //   40-55 chars → 110px
  //   55-70 chars → 92px
  //   70+ chars → 78px
  let fontSize = 128;
  if (visibleLength >= 70) fontSize = 78;
  else if (visibleLength >= 55) fontSize = 92;
  else if (visibleLength >= 40) fontSize = 110;

  return `<div class="body">
    <div class="hook" style="font-size: ${fontSize}px;">${h.headline}</div>
    <div class="hook-sub">${h.sub}</div>
  </div>`;
}

function buildPrompt(p, attribution, platform) {
  // Auto-shrink title — check both total length AND longest single word
  // (one long word like "HALLUCINATION" can blow out the layout even at low total length)
  const titleVisible = p.title.replace(/<[^>]+>/g, '');
  const titleLen = titleVisible.length;
  const longestWord = Math.max(...titleVisible.split(/[\s.]+/).filter(Boolean).map(w => w.length));
  let titleSize = 88;
  if (longestWord >= 13 || titleLen >= 28) titleSize = 64;       // e.g. "HALLUCINATION" (13) or full title 28+ chars
  else if (longestWord >= 11 || titleLen >= 22) titleSize = 74;

  // Auto-shrink prompt body if it's a long Shape A-prime question
  const promptLen = p.prompt.length;
  let promptSize = 54;
  if (promptLen >= 220) promptSize = 42;
  else if (promptLen >= 160) promptSize = 48;

  const box = platform === 'claude' ? buildClaudeBox(p.prompt, promptSize) : buildGPTBox(p.prompt, promptSize);

  return `<div class="body">
    <div class="prompt-title" style="font-size: ${titleSize}px;">${p.title}</div>
    ${box}
    <div class="attribution">— ${attribution}</div>
  </div>`;
}

function buildGPTBox(prompt, promptSize) {
  return `<div class="gpt-box">
      <div class="gpt-prompt" style="font-size: ${promptSize}px;">${prompt}</div>
      <div class="gpt-icons">
        <div class="gpt-icons-left"><span class="icon-plus">${PLUS_SVG}</span></div>
        <div class="gpt-icons-right">
          <span class="icon-mic">${MIC_SVG}</span>
          <span class="icon-send">${SEND_SVG}</span>
        </div>
      </div>
    </div>`;
}

function buildClaudeBox(prompt, promptSize) {
  return `<div class="claude-box">
      <div class="claude-prompt" style="font-size: ${promptSize}px;">${prompt}</div>
      <div class="claude-icons">
        <div class="claude-icons-left"><span class="icon-plus">${PLUS_SVG}</span></div>
        <div class="claude-icons-right">
          <span class="icon-claude-send">${SEND_SVG}</span>
        </div>
      </div>
    </div>`;
}

function buildCTA(c, pathContext) {
  // If pathContext is set, render path-targeted CTA instead of generic
  if (pathContext && pathContext.pathKey && PATHS[pathContext.pathKey]) {
    const path = PATHS[pathContext.pathKey];
    return `<div class="body">
      <div class="cta-scrim">
        <div class="cta-headline">${c.headline}</div>
        <div class="cta-instruction">search:</div>
        <div class="cta-search-row">
          <img class="cta-app-icon" src="${APP_ICON}" alt="Iro app icon" />
          <div class="cta-search">Iro AI</div>
        </div>
        <div class="cta-instruction">→ start with</div>
        <div class="cta-path">${path.name}</div>
        <div class="cta-slogan">${c.slogan}</div>
      </div>
    </div>`;
  }
  // Default generic CTA
  return `<div class="body">
    <div class="cta-scrim">
      <div class="cta-headline">${c.headline}</div>
      <div class="cta-instruction">${c.instructionAbove}</div>
      <div class="cta-search-row">
        <img class="cta-app-icon" src="${APP_ICON}" alt="Iro app icon" />
        <div class="cta-search">${c.searchTerm}</div>
      </div>
      <div class="cta-instruction">${c.instructionBelow}</div>
      <div class="cta-slogan">${c.slogan}</div>
    </div>
  </div>`;
}

// ============================================================
// PRESET: pain_story builders
// Each beat is just a single italic serif sentence centered on a
// shared aesthetic photo. The CTA is the only multi-element slide
// and stays text-only (no chat boxes, no app icon).
// ============================================================
function buildPainText(item, kind) {
  if (!item) return '';
  const text = typeof item === 'string' ? item : (item.text || '');
  const cls = kind === 'hook' ? 'pain-text pain-text-hook' : 'pain-text';
  return `<div class="${cls}">${text}</div>`;
}

function buildPainCTA(c, attribution) {
  if (!c) return '';
  const headline = c.headline ? `<div class="pain-cta-headline">${c.headline}</div>` : '';
  const ctaLineParts = [];
  if (c.instructionAbove) ctaLineParts.push(`<span>${c.instructionAbove}</span>`);
  if (c.searchTerm) ctaLineParts.push(`<strong>${c.searchTerm}</strong>`);
  if (c.instructionBelow) ctaLineParts.push(`<span>${c.instructionBelow}</span>`);
  const ctaLine = ctaLineParts.length
    ? `<div class="pain-cta-line">${ctaLineParts.join(' ')}</div>`
    : '';
  const slogan = c.slogan ? `<div class="pain-cta-slogan">${c.slogan}</div>` : '';
  const attr = attribution ? `<div class="pain-attribution">${attribution}</div>` : '';
  return `<div class="pain-cta">${headline}${ctaLine}${slogan}</div>${attr}`;
}

// ============================================================
// PRESET: meme_pov builders
// Top + bottom captions floated over a full-bleed photo background.
// Watermark is intentionally tiny — meme posts perform best with
// minimal branding.
// ============================================================
function buildMemePanel(panel, attribution) {
  if (!panel) return '';
  const top = panel.top ? `<div class="meme-caption meme-top">${panel.top}</div>` : '';
  const bottom = panel.bottom ? `<div class="meme-caption meme-bottom">${panel.bottom}</div>` : '';
  // Watermark is per-panel optional. If no panel.watermark, falls back to
  // the slideshow-wide attribution. Pass empty string in either to skip.
  const wmText = panel.watermark != null ? panel.watermark : attribution;
  const wm = wmText ? `<div class="meme-watermark">${wmText}</div>` : '';
  return `${top}${bottom}${wm}`;
}

function buildMemeCTA(c, attribution) {
  if (!c) return '';
  const headlineParts = [];
  if (c.instructionAbove) headlineParts.push(c.instructionAbove);
  if (c.searchTerm) headlineParts.push(`<span class="meme-cta-search">${c.searchTerm}</span>`);
  if (c.instructionBelow) headlineParts.push(c.instructionBelow);
  const headlineLine = headlineParts.length
    ? `<div class="meme-cta-line">${headlineParts.join(' ')}</div>`
    : c.headline ? `<div class="meme-cta-line">${c.headline}</div>` : '';
  const slogan = c.slogan ? `<div class="meme-cta-slogan">${c.slogan}</div>` : '';
  const wmText = c.watermark != null ? c.watermark : attribution;
  const wm = wmText ? `<div class="meme-watermark">${wmText}</div>` : '';
  return `<div class="meme-cta">${headlineLine}${slogan}</div>${wm}`;
}

// ============================================================
// PRESET: aspirational builders
// Bottom-anchored editorial typography over a cinematic photo.
// Inline <strong> = gold, <em> = cyan (both reset to upright bold)
// so the user can highlight status and outcome words from the JSON
// without learning a custom token language.
// ============================================================
function buildAspirationalHook(h) {
  if (!h) return '';
  const headline = h.headline ? `<div class="asp-hook">${h.headline}</div>` : '';
  const supporting = h.supporting ? `<div class="asp-supporting">${h.supporting}</div>` : '';
  return `${headline}${supporting}`;
}

function buildAspirationalBeat(b) {
  if (!b) return '';
  const label = b.label ? `<div class="asp-label">${b.label}</div>` : '';
  const text = b.text ? `<div class="asp-text">${b.text}</div>` : '';
  return `${label}${text}`;
}

function buildAspirationalCTA(c, attribution) {
  if (!c) return '';
  // Eyebrow surfaces the platform context (e.g. "AVAILABLE NOW" or
  // c.instructionAbove if supplied) above the gold rule. Falls back to
  // a sensible default so the visual frame holds even with sparse JSON.
  const eyebrowText = c.instructionAbove || (c.searchTerm ? 'available on' : '');
  const eyebrow = eyebrowText
    ? `<div class="asp-cta-eyebrow">${eyebrowText}</div>`
    : '';
  const ruleTop = `<div class="asp-cta-rule"></div>`;
  const headline = c.headline ? `<div class="asp-cta-headline">${c.headline}</div>` : '';
  // App icon — on by default. Position via cta.appIconPosition:
  //   'beside' (default) — icon left of the wordmark in a single row
  //   'under'            — icon stacked below the wordmark
  //   'over'             — icon stacked above the wordmark
  // Opt out entirely with cta.showAppIcon: false for a text-only stamp.
  const showIcon = c.showAppIcon !== false;
  const iconPos = (c.appIconPosition === 'under' || c.appIconPosition === 'over')
    ? c.appIconPosition
    : 'beside';
  const iconHtml = showIcon
    ? `<img class="asp-cta-app-icon" src="${APP_ICON}" alt="Iro app icon" />`
    : '';
  const searchEl = c.searchTerm ? `<div class="asp-cta-search">${c.searchTerm}</div>` : '';
  // Lay out the brand stamp differently per position. 'beside' wraps
  // icon + search in a flex row so they sit side-by-side; 'over' /
  // 'under' just sandwich the icon before / after the search div, with
  // CSS handling vertical centering via the .asp-cta flex column.
  let stamp;
  if (!showIcon || !c.searchTerm) {
    stamp = searchEl;
  } else if (iconPos === 'beside') {
    stamp = `<div class="asp-cta-stamp-row">${iconHtml}${searchEl}</div>`;
  } else if (iconPos === 'over') {
    stamp = `${iconHtml}${searchEl}`;
  } else {
    stamp = `${searchEl}${iconHtml}`;
  }
  // instructionBelow becomes a small uppercase meta line under the
  // brand lockup, e.g. "the app store · 5 min/day".
  const meta = c.instructionBelow ? `<div class="asp-cta-meta">${c.instructionBelow}</div>` : '';
  const ruleBottom = `<div class="asp-cta-rule asp-cta-rule-bottom"></div>`;
  const slogan = c.slogan ? `<div class="asp-cta-slogan">${c.slogan}</div>` : '';
  const attr = attribution ? `<div class="asp-attribution">${attribution}</div>` : '';
  // The has-app-icon modifier hides the cyan accent bar (the ::after on
  // .asp-cta-search) so it doesn't compete with the icon. icon-{pos}
  // scopes the per-position margin rules above.
  const wrapperCls = 'asp-cta' + (showIcon ? ` has-app-icon icon-${iconPos}` : '');
  return `<div class="${wrapperCls}">${eyebrow}${ruleTop}${headline}${stamp}${meta}${ruleBottom}${slogan}</div>${attr}`;
}

// ============================================================
// PRESET: product_demo builders
// Hook + feature slides wrap a phone mockup around an Iro
// screenshot. The screenshot URL travels as item.bg so the user
// can assign one with the existing per-slide bg picker without
// learning a new field name.
// ============================================================
function phoneMockup(screenshotUrl) {
  const safeUrl = screenshotUrl ? String(screenshotUrl).replace(/'/g, "\\'") : '';
  const screenStyle = safeUrl ? `style="background-image: url('${safeUrl}')"` : '';
  return `<div class="phone-mockup">
            <div class="phone-notch"></div>
            <div class="phone-screen" ${screenStyle}></div>
          </div>`;
}

function buildProductHook(h) {
  if (!h) return '';
  const headline = h.headline ? `<div class="product-headline">${h.headline}</div>` : '';
  const screenshot = h.bg || h.screenshot || '';
  const subline = h.supporting ? `<div class="product-subline">${h.supporting}</div>` : '';
  return `${headline}${phoneMockup(screenshot)}${subline}`;
}

function buildProductFeature(f) {
  if (!f) return '';
  const headline = f.headline ? `<div class="product-headline">${f.headline}</div>` : '';
  const screenshot = f.bg || f.screenshot || '';
  const subline = f.subline ? `<div class="product-subline">${f.subline}</div>` : '';
  return `${headline}${phoneMockup(screenshot)}${subline}`;
}

function buildProductCTA(c, attribution) {
  if (!c) return '';
  // CTA can show an App Store screenshot inside the mockup just like a
  // feature slide. The picker writes to c.bg; c.screenshot is also
  // accepted as an alias for hand-edited JSON.
  const screenshot = c.bg || c.screenshot || '';
  const mockup = `<div class="product-cta-mockup-wrap">${phoneMockup(screenshot)}</div>`;
  const headline = c.headline ? `<div class="product-cta-headline">${c.headline}</div>` : '';
  // Pseudo-Apple-ish download badge — not the literal mark, just a
  // recognisable "Download on the App Store" lockup.
  const badge = `
    <a class="product-cta-badge">
      <span class="product-cta-badge-glyph">⬇</span>
      <span class="product-cta-badge-text">
        <span class="product-cta-badge-eyebrow">Download on the</span>
        <span class="product-cta-badge-store">App Store</span>
      </span>
    </a>`;
  // Search line lives under the badge as a secondary instruction.
  let searchLine = '';
  if (c.instructionAbove || c.searchTerm) {
    const above = c.instructionAbove ? `${c.instructionAbove} ` : '';
    const term = c.searchTerm ? `<strong>${c.searchTerm}</strong>` : '';
    searchLine = `<div class="product-cta-search-line">${above}${term}</div>`;
  }
  const slogan = c.slogan ? `<div class="product-cta-slogan">${c.slogan}</div>` : '';
  const attr = attribution ? `<div class="product-attribution">${attribution}</div>` : '';
  return `${mockup}${headline}${badge}${searchLine}${slogan}${attr}`;
}

// ============================================================
// PRESET: checklist builders
// One item per slide, dominant tinted status icon, single short
// statement. Status defaults to 'check' so items{text} alone work.
// ============================================================
function buildChecklistHook(h) {
  if (!h) return '';
  const headline = h.headline ? `<div class="check-hook">${h.headline}</div>` : '';
  const subline = h.subline ? `<div class="check-subline">${h.subline}</div>` : '';
  return `${headline}${subline}`;
}

function buildChecklistItem(item) {
  if (!item) return '';
  const status = item.status === 'cross' || item.status === 'warning' ? item.status : 'check';
  // Plain unicode glyphs render reliably in html2canvas; explicit
  // glyph per status keeps icon weight visually consistent across
  // captures (an SVG variant would need separate viewbox tuning).
  const glyph = status === 'cross' ? '✕' : status === 'warning' ? '!' : '✓';
  const icon = `<div class="check-icon check-icon-${status}">${glyph}</div>`;
  const text = item.text ? `<div class="check-text">${item.text}</div>` : '';
  return `${icon}${text}`;
}

function buildChecklistCTA(c, attribution) {
  if (!c) return '';
  const headline = c.headline ? `<div class="check-cta-headline">${c.headline}</div>` : '';
  let searchRow = '';
  if (c.instructionAbove || c.searchTerm) {
    const above = c.instructionAbove ? `<span class="check-cta-instruction">${c.instructionAbove}</span>` : '';
    const term = c.searchTerm ? `<span class="check-cta-search">${c.searchTerm}</span>` : '';
    searchRow = `<div class="check-cta-search-row">${above}${term}</div>`;
  }
  const below = c.instructionBelow ? `<div class="check-cta-instruction">${c.instructionBelow}</div>` : '';
  const slogan = c.slogan ? `<div class="check-cta-slogan">${c.slogan}</div>` : '';
  const attr = attribution ? `<div class="check-attribution">${attribution}</div>` : '';
  return `${headline}${searchRow}${below}${slogan}${attr}`;
}

// ============================================================
// PRESET: handwritten_pack builders
// Same JSON shape as prompt_pack (hook with headline+sub, prompts
// array with title+prompt, standard CTA). Visual treatment is
// cream paper + Caveat handwritten ink, no chat boxes / mascot /
// counter.
// ============================================================
function buildHandwrittenHook(h) {
  if (!h) return '';
  const headline = h.headline ? `<div class="hw-hook">${h.headline}</div>` : '';
  // Reuse the prompt_pack `sub` field name for symmetry.
  const sub = h.sub ? `<div class="hw-hook-sub">${h.sub}</div>` : '';
  return `${headline}${sub}`;
}

function buildHandwrittenPrompt(p) {
  if (!p) return '';
  const title = p.title ? `<div class="hw-prompt-title">${p.title}</div>` : '';
  // Wrap the prompt body in curly quotes to match the screenshot
  // aesthetic ("Here's my grocery receipt..."). The user's JSON
  // doesn't need to include the quotes.
  const body = p.prompt
    ? `<div class="hw-prompt-body">&ldquo;${p.prompt}&rdquo;</div>`
    : '';
  return `${title}${body}`;
}

function buildHandwrittenCTA(c, attribution) {
  if (!c) return '';
  const headline = c.headline ? `<div class="hw-cta-headline">${c.headline}</div>` : '';
  // Render search line as one continuous handwritten phrase with the
  // search term hand-underlined.
  const searchParts = [];
  if (c.instructionAbove) searchParts.push(c.instructionAbove);
  if (c.searchTerm) searchParts.push(`<span class="hw-cta-search">${c.searchTerm}</span>`);
  if (c.instructionBelow) searchParts.push(c.instructionBelow);
  const searchLine = searchParts.length
    ? `<div class="hw-cta-search-line">${searchParts.join(' ')}</div>`
    : '';
  const slogan = c.slogan ? `<div class="hw-cta-slogan">${c.slogan}</div>` : '';
  const attr = attribution ? `<div class="hw-attribution">${attribution}</div>` : '';
  return `${headline}${searchLine}${slogan}${attr}`;
}

// ============================================================
// PRESET: app_stack builders
// "5 apps I use…" format. Hook = centered headline on a photo.
// Each app slide = rounded icon + name + short description.
// No dedicated CTA slide — the last app IS the last slide.
// ============================================================
function buildAppStackHook(h) {
  if (!h) return '';
  const text = h.headline || h.text || '';
  const len = text.replace(/<[^>]+>/g, '').length;
  let fs = 88;
  if (len >= 70) fs = 60;
  else if (len >= 55) fs = 68;
  else if (len >= 40) fs = 76;
  return `<div class="as-hook"><div class="as-hook-text" style="font-size:${fs}px">${text}</div></div>`;
}

function buildAppStackApp(a, attribution) {
  if (!a) return '';
  const safeIcon = a.iconUrl ? String(a.iconUrl).replace(/'/g, "\\'") : '';
  const icon = safeIcon
    ? `<img class="as-app-icon" src="${safeIcon}" alt="${(a.name || '').replace(/"/g, '&quot;')}" />`
    : `<div class="as-app-icon"></div>`;
  const name = a.name ? `<div class="as-app-name">${a.name}</div>` : '';
  const desc = a.description ? `<div class="as-app-desc">${a.description}</div>` : '';
  const attr = attribution ? `<div class="as-attribution">${attribution}</div>` : '';
  return `<div class="as-app-wrap"><div class="as-app-row">${icon}<div class="as-app-info">${name}${desc}</div></div></div>${attr}`;
}

render();

// ============================================================
// EMBEDDED MODE — when loaded inside an iframe (e.g. the React app),
// hide the built-in paste panel since the parent provides its own controls.
// ============================================================
if (window.parent !== window) {
  const panel = document.getElementById('paste-panel');
  if (panel) panel.style.display = 'none';
}

// ============================================================
// MESSAGE BRIDGE — parent posts {type:'render', slides:{...}} to swap content.
// Responds with {type:'rendered'} when done.
// ============================================================
window.addEventListener('message', async (e) => {
  const msg = e.data;
  if (!msg || typeof msg !== 'object') return;

  if (msg.type === 'render' && msg.slides) {
    Object.keys(SLIDES).forEach(k => delete SLIDES[k]);
    Object.assign(SLIDES, msg.slides);
    rerender();
    try { e.source.postMessage({ type: 'rendered' }, '*'); } catch (err) {}
    return;
  }

  // Captures slide 0 (the hook) at low resolution and posts the PNG blob
  // back to the parent. Used by the React shell when the user taps
  // "Save to history" so each post in the analytics list has a thumbnail.
  if (msg.type === 'capture-thumb') {
    try {
      const html2canvas = await loadHtml2Canvas();
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (err) {}
      }
      const slide = document.querySelector('.slide');
      if (!slide) {
        e.source.postMessage({ type: 'thumb', requestId: msg.requestId, error: 'no slides rendered' }, '*');
        return;
      }
      // 0.25 scale → ~270×480 PNG, ~30 KB. Plenty for a list thumbnail.
      const canvas = await html2canvas(slide, {
        width: 1080, height: 1920, scale: 0.25, useCORS: true, backgroundColor: '#000000',
      });
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
      e.source.postMessage({ type: 'thumb', requestId: msg.requestId, blob }, '*');
    } catch (err) {
      try { e.source.postMessage({ type: 'thumb', requestId: msg.requestId, error: String(err) }, '*'); } catch (e2) {}
    }
    return;
  }
});

// Load any previously-saved slides from localStorage on page load
window.addEventListener('DOMContentLoaded', () => {
  try {
    const saved = localStorage.getItem('kiro_slides_json');
    if (saved) {
      document.getElementById('paste-input').value = saved;
      // Auto-render the saved version so refreshes don't lose work
      const parsed = parseSlidesInput(saved);
      if (parsed) {
        Object.assign(SLIDES, parsed);
        rerender();
        showStatus('info', 'Loaded last slideshow from your browser.');
      }
    }
  } catch (e) { /* ignore */ }
});

// ============================================================
// PASTE PANEL — load/parse/validate JSON pasted from Barry/Claude
// ============================================================
function togglePastePanel() {
  const panel = document.getElementById('paste-panel');
  const toggle = document.getElementById('paste-toggle');
  panel.classList.toggle('collapsed');
  toggle.textContent = panel.classList.contains('collapsed') ? '+' : '−';
}

function showStatus(type, msg) {
  const el = document.getElementById('paste-status');
  el.className = 'paste-status show ' + type;
  el.textContent = msg;
  if (type === 'ok' || type === 'info') {
    setTimeout(() => { el.classList.remove('show'); }, 4000);
  }
}

function parseSlidesInput(raw) {
  if (!raw || !raw.trim()) {
    showStatus('err', 'Paste box is empty.');
    return null;
  }

  let text = raw.trim();

  // Strip "const SLIDES = " wrapper if present
  text = text.replace(/^\s*(const|let|var)\s+SLIDES\s*=\s*/, '');
  // Strip trailing semicolon
  text = text.replace(/;\s*$/, '');
  // Strip code fences if Claude/ChatGPT added them
  text = text.replace(/^```(?:json|javascript|js)?\s*/i, '').replace(/```\s*$/, '');
  text = text.trim();

  // Normalize smart quotes that might come from a non-code paste source
  text = text
    .replace(/[\u201C\u201D]/g, '"')
    .replace(/[\u2018\u2019]/g, "'");

  // Try strict JSON first
  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e1) {
    // Fall back to JS object parsing (handles unquoted keys, single quotes, etc.)
    try {
      parsed = (new Function('return (' + text + ')'))();
    } catch (e2) {
      showStatus('err', 'Could not parse — looks like invalid JSON. Most common cause: smart quotes or missing commas. Error: ' + e2.message);
      return null;
    }
  }

  // Validate structure
  if (!parsed || typeof parsed !== 'object') {
    showStatus('err', 'Parsed value is not an object.');
    return null;
  }
  if (!parsed.hook || !parsed.hook.headline) {
    showStatus('err', 'Missing required field: hook.headline');
    return null;
  }
  // Prompt count is flexible — 3 is the minimum for a coherent arc, 15 is the upper sanity cap.
  // Remember to update hook.headline ("7 Claude Prompts" → "3 Claude Prompts") to match your chosen count.
  if (!Array.isArray(parsed.prompts) || parsed.prompts.length < 3 || parsed.prompts.length > 15) {
    showStatus('err', `Need between 3 and 15 prompts. Got ${parsed.prompts ? parsed.prompts.length : 0}.`);
    return null;
  }
  for (let i = 0; i < parsed.prompts.length; i++) {
    if (!parsed.prompts[i].title || !parsed.prompts[i].prompt) {
      showStatus('err', `Prompt #${i+1} is missing 'title' or 'prompt' field.`);
      return null;
    }
  }
  if (!parsed.cta || !parsed.cta.headline) {
    showStatus('err', 'Missing required field: cta.headline');
    return null;
  }
  if (!parsed.attribution) {
    parsed.attribution = '@tryiro'; // default
  }

  // Platform is REQUIRED — controls whether prompts render in a ChatGPT or Claude chat box
  if (!parsed.platform) {
    showStatus('err', 'Missing required field: platform. Must be "chatgpt" or "claude".');
    return null;
  }
  if (parsed.platform !== 'chatgpt' && parsed.platform !== 'claude') {
    showStatus('err', `Unknown platform: "${parsed.platform}". Must be "chatgpt" or "claude".`);
    return null;
  }

  // Mascot is OPTIONAL but if present, validate it matches a known mascot key
  if (parsed.mascot !== undefined) {
    if (typeof parsed.mascot !== 'string' || !MASCOTS[parsed.mascot]) {
      const available = Object.keys(MASCOTS).join(', ');
      showStatus('err', `Unknown mascot: "${parsed.mascot}". Must be one of: ${available}`);
      return null;
    }
  }

  // Path context is OPTIONAL but if present, validate the pathKey matches a known path
  if (parsed.pathContext) {
    if (!parsed.pathContext.pathKey) {
      showStatus('err', 'pathContext is set but missing pathKey.');
      return null;
    }
    if (!PATHS[parsed.pathContext.pathKey]) {
      const available = Object.keys(PATHS).join(', ');
      showStatus('err', `Unknown pathKey: "${parsed.pathContext.pathKey}". Must be one of: ${available}`);
      return null;
    }
  }

  return parsed;
}

function loadPastedSlides() {
  const raw = document.getElementById('paste-input').value;
  const parsed = parseSlidesInput(raw);
  if (!parsed) return;

  // Update SLIDES and re-render
  Object.keys(SLIDES).forEach(k => delete SLIDES[k]);
  Object.assign(SLIDES, parsed);
  rerender();

  // Persist
  try { localStorage.setItem('kiro_slides_json', raw); } catch(e) {}

  showStatus('ok', '✓ Rendered. Scroll to review, then click ⬇ Download.');
}

function resetSlides() {
  if (!confirm('Reset to the default slideshow? This will clear your pasted JSON.')) return;
  try { localStorage.removeItem('kiro_slides_json'); } catch(e) {}
  document.getElementById('paste-input').value = '';
  showStatus('info', 'Reset. Refresh the page to fully reload defaults.');
}

function rerender() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  render();
}

// ============================================================
// DOWNLOAD ALL SLIDES — one-click export to 1080x1920 PNGs
// ============================================================
function loadHtml2Canvas() {
  return new Promise((resolve, reject) => {
    if (window.html2canvas) return resolve(window.html2canvas);
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = () => resolve(window.html2canvas);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function toggleSafeZone() {
  document.body.classList.toggle('show-safezone');
}

// Files captured on the previous tap that we couldn't share immediately
// because the browser's transient activation expired during capture
// (iOS, mostly). Stashed so the next tap — which has fresh activation —
// can call navigator.share() without re-rendering everything.
//
// `var` (not `let`) is intentional: render() is called at module level
// well above this line, and a `let` here would put the variable in the
// temporal dead zone during that first call → ReferenceError → engine
// never finishes initialising → blank preview.
var pendingShareFiles = null;

async function captureAllSlidesAsFiles(label) {
  const html2canvas = await loadHtml2Canvas();

  // Force each weight of Inter to resolve before we paint into a canvas.
  // document.fonts.ready alone can return before a specific weight is
  // usable; document.fonts.load() asks the browser to fetch + decode
  // that exact FontFace.
  if (document.fonts && document.fonts.load) {
    try {
      const weights = [400, 500, 600, 700, 800, 900];
      await Promise.all(weights.map((w) => document.fonts.load(`${w} 100px Inter`)));
      if (document.fonts.ready) await document.fonts.ready;
    } catch (e) {}
  }

  const safeWasOn = document.body.classList.contains('show-safezone');
  if (safeWasOn) document.body.classList.remove('show-safezone');
  document.querySelector('.hud').style.visibility = 'hidden';

  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;

  const slideEls = document.querySelectorAll('.slide');
  const files = [];
  try {
    for (let i = 0; i < slideEls.length; i++) {
      if (label) label.textContent = `Capturing ${i+1} / ${slideEls.length}…`;
      const canvas = await html2canvas(slideEls[i], {
        width: 1080,
        height: 1920,
        scale: 1,
        useCORS: true,
        backgroundColor: '#000000',
      });
      // Filenames are zero-padded so iOS Photos sorts them in slide order
      // when the user taps "Save X Images" from the share sheet.
      const filename = `iro_${stamp}_slide_${String(i+1).padStart(2,'0')}.png`;
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
      files.push(new File([blob], filename, { type: 'image/png' }));
    }
  } finally {
    if (safeWasOn) document.body.classList.add('show-safezone');
    document.querySelector('.hud').style.visibility = 'visible';
  }
  return files;
}

async function downloadAllSlides() {
  const btn = document.getElementById('dl-btn');
  const label = document.getElementById('dl-btn-label');
  const originalText = label.textContent;

  // Fast path: previous tap captured the files but couldn't share because
  // activation expired. This tap has fresh activation — share immediately.
  // Only relevant on mobile (the share path is mobile-only below).
  const isMobileFast = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobileFast && pendingShareFiles && typeof navigator.share === 'function') {
    try {
      label.textContent = 'Opening share sheet…';
      await navigator.share({ files: pendingShareFiles, title: 'Iro Slideshow' });
      label.textContent = '✓ Saved — check Photos';
    } catch (err) {
      if (err && err.name === 'AbortError') {
        label.textContent = originalText;
      } else {
        label.textContent = '✗ Share failed';
      }
    }
    pendingShareFiles = null;
    setTimeout(() => { label.textContent = originalText; }, 2500);
    return;
  }

  btn.disabled = true;
  try {
    label.textContent = 'Loading…';
    const files = await captureAllSlidesAsFiles(label);

    // Mobile path: Web Share API. iOS share sheet → "Save X Images" →
    // every PNG lands in Photos, in filename (and therefore slide) order.
    //
    // Gated on mobile-only because desktop browsers (Chrome on Windows
    // especially) report canShare({files}) as true, then either open a
    // half-broken system share dialog or hang the share() promise
    // entirely — leaving the button stuck on "Opening share sheet…".
    // Desktop is much better served by the per-file download loop below,
    // which writes the PNGs straight to ~/Downloads.
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const canShare = isMobile
      && typeof navigator.canShare === 'function'
      && navigator.canShare({ files });
    if (canShare) {
      try {
        label.textContent = 'Opening share sheet…';
        await navigator.share({ files, title: 'Iro Slideshow' });
        label.textContent = '✓ Saved — check Photos';
        setTimeout(() => { label.textContent = originalText; btn.disabled = false; }, 3000);
        return;
      } catch (err) {
        if (err && err.name === 'AbortError') {
          // User dismissed the share sheet — leave files cached so the next
          // tap shares again without re-capture.
          pendingShareFiles = files;
          label.textContent = '⤴ Tap again to save';
          btn.disabled = false;
          return;
        }
        if (err && err.name === 'NotAllowedError') {
          // Capture took longer than the user-activation window. Cache the
          // files; the next tap's fresh activation will share them.
          pendingShareFiles = files;
          label.textContent = '⤴ Tap again to save';
          btn.disabled = false;
          return;
        }
        // Unknown share error → fall through to the per-file download loop.
        console.warn('Share failed; falling back to downloads.', err);
      }
    }

    // Desktop fallback: per-file download. Object URLs (vs the old data URLs)
    // mean the same File array can power either branch without re-encoding.
    for (let i = 0; i < files.length; i++) {
      label.textContent = `Saving ${i+1} / ${files.length}…`;
      const url = URL.createObjectURL(files[i]);
      const link = document.createElement('a');
      link.href = url;
      link.download = files[i].name;
      link.click();
      // Tiny delay so the browser doesn't coalesce/cancel rapid downloads.
      await new Promise(r => setTimeout(r, 300));
      URL.revokeObjectURL(url);
    }
    label.textContent = '✓ Done — check Downloads';
    setTimeout(() => { label.textContent = originalText; btn.disabled = false; }, 3000);
  } catch (err) {
    console.error(err);
    document.querySelector('.hud').style.visibility = 'visible';
    label.textContent = '✗ Failed — check console';
    setTimeout(() => { label.textContent = originalText; btn.disabled = false; }, 3000);
  }
}
</script>
