<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kiro Slideshow Engine</title>
<style>
  :root {
    --bg: #000000;
    --ink: #FFFFFF;
    --ink-muted: #A0A6B8;
    --ink-faint: #5A6378;
    --accent: #00E5FF;
    --box-bg: rgba(28, 32, 44, 0.92);
    --box-border: rgba(255,255,255,0.06);
    --box-icon: #6B7280;
    --page-w: 1080px;
    --page-h: 1920px;
  }
  html, body { margin: 0; padding: 0; background: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif; color: var(--ink); }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px 0; }
  .slide { position: relative; width: var(--page-w); height: var(--page-h); background: var(--bg); overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); color: var(--ink); }
  .bg-mascot { position: absolute; top: 48%; left: 50%; width: 1200px; height: 1200px; transform: translate(-50%, -50%); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.85; pointer-events: none; }
  .slide-cta .bg-mascot { opacity: 0.85; }
  .bg-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.30) 70%, rgba(0,0,0,0.65) 100%), linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.0) 25%, rgba(0,0,0,0.0) 50%, rgba(0,0,0,1.0) 82%, rgba(0,0,0,1.0) 100%); pointer-events: none; }
  body.show-safezone .slide::after { content: ''; position: absolute; top: 14%; bottom: 24%; left: 12%; right: 12%; border: 4px dashed rgba(255, 80, 80, 0.55); pointer-events: none; z-index: 50; }
  .frame { position: absolute; inset: 0; padding: 140px 90px 200px 90px; display: flex; flex-direction: column; z-index: 10; }
  .top-counter { position: absolute; top: 80px; right: 90px; font-size: 44px; font-weight: 600; color: var(--ink-muted); background: rgba(0,0,0,0.4); padding: 12px 28px; border-radius: 999px; backdrop-filter: blur(8px); }
  .body { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 100px; }
  .hook { font-size: 128px; line-height: 1.08; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
  .hook strong { font-weight: 900; }
  .hook-sub { margin-top: 60px; font-size: 50px; font-weight: 400; color: var(--ink-muted); font-style: italic; }
  .prompt-title { font-size: 88px; font-weight: 600; letter-spacing: 0.01em; text-transform: uppercase; margin-bottom: 56px; color: var(--ink); }
  .prompt-title strong { font-weight: 900; }
  .gpt-box { width: 100%; background: var(--box-bg); border: 1px solid var(--box-border); border-radius: 36px; padding: 46px 48px 38px 48px; backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .gpt-prompt { font-size: 54px; line-height: 1.32; color: var(--ink); font-weight: 400; margin-bottom: 56px; text-align: left; }
  .gpt-icons { display: flex; justify-content: space-between; align-items: center; }
  .gpt-icons-left, .gpt-icons-right { display: flex; gap: 24px; align-items: center; }
  .icon-plus, .icon-mic, .icon-send { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; color: var(--box-icon); }
  .icon-send { background: rgba(255,255,255,0.12); border-radius: 50%; color: var(--ink); }
  /* CLAUDE BOX — distinct chrome so viewers register "this is Claude" (warmer bg + orange send + no mic) */
  .claude-box { width: 100%; background: rgba(38, 32, 28, 0.94); border: 1px solid rgba(204, 120, 92, 0.20); border-radius: 36px; padding: 46px 48px 38px 48px; backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .claude-prompt { font-size: 54px; line-height: 1.32; color: var(--ink); font-weight: 400; margin-bottom: 56px; text-align: left; }
  .claude-icons { display: flex; justify-content: space-between; align-items: center; }
  .claude-icons-left, .claude-icons-right { display: flex; gap: 24px; align-items: center; }
  .icon-claude-send { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; background: #CC785C; border-radius: 50%; color: #ffffff; }
  .attribution { margin-top: 32px; font-size: 38px; font-weight: 600; color: var(--ink-muted); letter-spacing: 0.18em; align-self: flex-start; }
  .cta-scrim { width: 100%; padding: 60px 40px; background: radial-gradient(ellipse at center, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.65) 60%, rgba(0,0,0,0.0) 100%); text-align: center; }
  .cta-headline { font-size: 72px; line-height: 1.1; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 60px; color: var(--ink); text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
  .cta-headline strong { font-weight: 900; }
  .cta-instruction { font-size: 60px; font-weight: 400; color: var(--ink); margin-bottom: 20px; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
  .cta-search { font-size: 150px; font-weight: 800; color: var(--accent); border-bottom: 8px solid var(--accent); display: inline-block; padding-bottom: 8px; letter-spacing: -0.02em; text-shadow: 0 2px 16px rgba(0, 229, 255, 0.4), 0 2px 8px rgba(0,0,0,0.6); }
  .cta-search-row { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 24px; }
  .cta-app-icon { width: 190px; height: 190px; border-radius: 40px; box-shadow: 0 6px 24px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06); flex-shrink: 0; }
  /* Path-targeted CTA: shows "→ start with [Path Name]" between search term and slogan */
  .cta-path { font-size: 76px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em; margin-bottom: 30px; padding: 8px 24px; background: rgba(0, 229, 255, 0.08); border: 2px solid rgba(0, 229, 255, 0.35); border-radius: 16px; display: inline-block; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
  .cta-slogan { margin-top: 70px; font-size: 56px; line-height: 1.25; color: var(--ink); font-weight: 600; font-style: italic; text-shadow: 0 2px 10px rgba(0,0,0,0.7); }
  .cta-slogan strong { font-weight: 800; font-style: normal; color: var(--accent); }
  .hud { position: fixed; top: 12px; left: 12px; background: #111; color: #eee; padding: 10px 14px; border-radius: 8px; font-size: 12px; z-index: 1000; }
  .hud button { margin-left: 8px; padding: 4px 8px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 12px; }

  /* ============================================================
     PASTE PANEL — fixed top-right, where you paste JSON from Barry/Claude
     ============================================================ */
  .paste-panel {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 420px;
    max-height: calc(100vh - 24px);
    background: #1a1f2e;
    color: #e8eaed;
    border: 1px solid #2a334a;
    border-radius: 12px;
    padding: 16px;
    z-index: 999;
    font-family: -apple-system, system-ui, sans-serif;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  .paste-panel.collapsed {
    transform: translateX(370px);
  }
  .paste-panel.collapsed .paste-body { display: none; }
  .paste-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }
  .paste-title {
    font-size: 14px;
    font-weight: 600;
    color: #00E5FF;
    letter-spacing: 0.02em;
  }
  .paste-toggle {
    background: none;
    border: none;
    color: #8a92a6;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
  }
  .paste-instructions {
    font-size: 11px;
    line-height: 1.5;
    color: #8a92a6;
    margin-bottom: 10px;
  }
  .paste-instructions code {
    background: #0e1426;
    padding: 1px 4px;
    border-radius: 3px;
    color: #00E5FF;
    font-size: 10px;
  }
  .paste-textarea {
    width: 100%;
    height: 280px;
    background: #0a0e1a;
    color: #e8eaed;
    border: 1px solid #2a334a;
    border-radius: 6px;
    padding: 10px;
    font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.4;
    resize: vertical;
    box-sizing: border-box;
    outline: none;
  }
  .paste-textarea:focus { border-color: #00E5FF; }
  .paste-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .paste-btn {
    flex: 1;
    padding: 10px 14px;
    background: #00E5FF;
    color: #0a0e1a;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .paste-btn:hover { background: #33ECFF; }
  .paste-btn.secondary {
    background: #2a334a;
    color: #e8eaed;
    flex: 0 0 auto;
    padding: 10px 12px;
  }
  .paste-btn.secondary:hover { background: #3a4560; }
  .paste-status {
    margin-top: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.4;
    display: none;
  }
  .paste-status.show { display: block; }
  .paste-status.ok { background: rgba(0, 229, 255, 0.1); color: #00E5FF; border: 1px solid rgba(0, 229, 255, 0.3); }
  .paste-status.err { background: rgba(255, 80, 80, 0.1); color: #ff8080; border: 1px solid rgba(255, 80, 80, 0.3); }
  .paste-status.info { background: #0e1426; color: #8a92a6; border: 1px solid #2a334a; }

  @media print {
    .paste-panel { display: none; }
  }
  @media print { body { background: #000; } .hud { display: none; } .stage { gap: 0; padding: 0; } .slide { box-shadow: none; page-break-after: always; width: 100vw; height: 100vh; } }
</style>
</head>

      Paste the <code>SLIDES</code> JSON from Barry or Claude below. Wrapping (<code>const SLIDES =</code> / <code>;</code>) is optional — the engine handles it either way.
    </div>
    <textarea class="paste-textarea" id="paste-input" spellcheck="false" placeholder='Paste JSON here. Either:

{
  "platform": "chatgpt",
  "mascot": "platinum",
  "hook": { ... },
  "prompts": [ ... ],
  "cta": { ... },
  "attribution": "@KIRO.APP"
}

— or —

const SLIDES = {
  platform: "chatgpt",
  mascot: "platinum",
  hook: { ... },
  ...
};

platform is REQUIRED. Valid: chatgpt, claude.
mascot is optional. Valid: bronze, silver, gold, platinum, diamond, iridescent.'></textarea>
    <div class="paste-actions">
      <button class="paste-btn" onclick="loadPastedSlides()">Render Slides</button>
      <button class="paste-btn secondary" onclick="resetSlides()" title="Reset to default">↺</button>
    </div>
    <div class="paste-status" id="paste-status"></div>
  </div>
</div>

<div class="stage" id="stage"></div>

<script>
// ============================================================
// RENDERER — do not edit below this line unless changing layout
// ============================================================
const PLUS_SVG = `<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const MIC_SVG = `<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
const SEND_SVG = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;

function render() {
  const stage = document.getElementById('stage');
  const slides = [];

  // Hook
  slides.push(buildHook(SLIDES.hook));
  // Prompts
  SLIDES.prompts.forEach((p, i) => slides.push(buildPrompt(p, SLIDES.attribution, SLIDES.platform)));
  // CTA
  slides.push(buildCTA(SLIDES.cta, SLIDES.pathContext));

  const total = slides.length;
  slides.forEach((slideHTML, i) => {
    const slide = document.createElement('div');
    const isCTA = i === total - 1;
    slide.className = 'slide' + (isCTA ? ' slide-cta' : '');
    const mascotKey = SLIDES.mascot || 'platinum';
    // CTA uses the sharp source supplied by the parent (brand moment);
    // hook + prompts use the baked blurred version from MASCOTS.
    const mascotUrl = (isCTA && window.__ctaMascotUrl)
      ? window.__ctaMascotUrl
      : (MASCOTS[mascotKey] || MASCOTS.platinum);
    slide.innerHTML = `
      <div class="bg-mascot" style="background-image: url('${mascotUrl}')"></div>
      <div class="bg-vignette"></div>
      <div class="top-counter">${i+1} / ${total}</div>
      <div class="frame">${slideHTML}</div>
    `;
    stage.appendChild(slide);
  });
}

function buildHook(h) {
  // Count visible text length (strip HTML tags for sizing math)
  const visibleLength = h.headline.replace(/<[^>]+>/g, '').length;
  // Default 128px, shrink for longer hooks. Tested ranges:
  //   <40 chars  → 128px (e.g. "7 ChatGPT Prompts Every AI Beginner Should Save" = 47 chars actually)
  //   40-55 chars → 110px
  //   55-70 chars → 92px
  //   70+ chars → 78px
  let fontSize = 128;
  if (visibleLength >= 70) fontSize = 78;
  else if (visibleLength >= 55) fontSize = 92;
  else if (visibleLength >= 40) fontSize = 110;

  return `<div class="body">
    <div class="hook" style="font-size: ${fontSize}px;">${h.headline}</div>
    <div class="hook-sub">${h.sub}</div>
  </div>`;
}

function buildPrompt(p, attribution, platform) {
  // Auto-shrink title — check both total length AND longest single word
  // (one long word like "HALLUCINATION" can blow out the layout even at low total length)
  const titleVisible = p.title.replace(/<[^>]+>/g, '');
  const titleLen = titleVisible.length;
  const longestWord = Math.max(...titleVisible.split(/[\s.]+/).filter(Boolean).map(w => w.length));
  let titleSize = 88;
  if (longestWord >= 13 || titleLen >= 28) titleSize = 64;       // e.g. "HALLUCINATION" (13) or full title 28+ chars
  else if (longestWord >= 11 || titleLen >= 22) titleSize = 74;

  // Auto-shrink prompt body if it's a long Shape A-prime question
  const promptLen = p.prompt.length;
  let promptSize = 54;
  if (promptLen >= 220) promptSize = 42;
  else if (promptLen >= 160) promptSize = 48;

  const box = platform === 'claude' ? buildClaudeBox(p.prompt, promptSize) : buildGPTBox(p.prompt, promptSize);

  return `<div class="body">
    <div class="prompt-title" style="font-size: ${titleSize}px;">${p.title}</div>
    ${box}
    <div class="attribution">— ${attribution}</div>
  </div>`;
}

function buildGPTBox(prompt, promptSize) {
  return `<div class="gpt-box">
      <div class="gpt-prompt" style="font-size: ${promptSize}px;">${prompt}</div>
      <div class="gpt-icons">
        <div class="gpt-icons-left"><span class="icon-plus">${PLUS_SVG}</span></div>
        <div class="gpt-icons-right">
          <span class="icon-mic">${MIC_SVG}</span>
          <span class="icon-send">${SEND_SVG}</span>
        </div>
      </div>
    </div>`;
}

function buildClaudeBox(prompt, promptSize) {
  return `<div class="claude-box">
      <div class="claude-prompt" style="font-size: ${promptSize}px;">${prompt}</div>
      <div class="claude-icons">
        <div class="claude-icons-left"><span class="icon-plus">${PLUS_SVG}</span></div>
        <div class="claude-icons-right">
          <span class="icon-claude-send">${SEND_SVG}</span>
        </div>
      </div>
    </div>`;
}

function buildCTA(c, pathContext) {
  // If pathContext is set, render path-targeted CTA instead of generic
  if (pathContext && pathContext.pathKey && PATHS[pathContext.pathKey]) {
    const path = PATHS[pathContext.pathKey];
    return `<div class="body">
      <div class="cta-scrim">
        <div class="cta-headline">${c.headline}</div>
        <div class="cta-instruction">search:</div>
        <div class="cta-search-row">
          <img class="cta-app-icon" src="${APP_ICON}" alt="Kiro app icon" />
          <div class="cta-search">Kiro AI</div>
        </div>
        <div class="cta-instruction">→ start with</div>
        <div class="cta-path">${path.name}</div>
        <div class="cta-slogan">${c.slogan}</div>
      </div>
    </div>`;
  }
  // Default generic CTA
  return `<div class="body">
    <div class="cta-scrim">
      <div class="cta-headline">${c.headline}</div>
      <div class="cta-instruction">${c.instructionAbove}</div>
      <div class="cta-search-row">
        <img class="cta-app-icon" src="${APP_ICON}" alt="Kiro app icon" />
        <div class="cta-search">${c.searchTerm}</div>
      </div>
      <div class="cta-instruction">${c.instructionBelow}</div>
      <div class="cta-slogan">${c.slogan}</div>
    </div>
  </div>`;
}

render();

// ============================================================
// EMBEDDED MODE — when loaded inside an iframe (e.g. the React app),
// hide the built-in paste panel since the parent provides its own controls.
// ============================================================
if (window.parent !== window) {
  const panel = document.getElementById('paste-panel');
  if (panel) panel.style.display = 'none';
}

// ============================================================
// MESSAGE BRIDGE — parent posts {type:'render', slides:{...}} to swap content.
// Responds with {type:'rendered'} when done.
// ============================================================
window.addEventListener('message', (e) => {
  const msg = e.data;
  if (!msg || typeof msg !== 'object' || msg.type !== 'render' || !msg.slides) return;
  // Optional sharp mascot source for CTA slide (data URL to avoid canvas taint).
  window.__ctaMascotUrl = msg.ctaMascotUrl || null;
  Object.keys(SLIDES).forEach(k => delete SLIDES[k]);
  Object.assign(SLIDES, msg.slides);
  rerender();
  try { e.source.postMessage({ type: 'rendered' }, '*'); } catch (err) {}
});

// Load any previously-saved slides from localStorage on page load
window.addEventListener('DOMContentLoaded', () => {
  try {
    const saved = localStorage.getItem('kiro_slides_json');
    if (saved) {
      document.getElementById('paste-input').value = saved;
      // Auto-render the saved version so refreshes don't lose work
      const parsed = parseSlidesInput(saved);
      if (parsed) {
        Object.assign(SLIDES, parsed);
        rerender();
        showStatus('info', 'Loaded last slideshow from your browser.');
      }
    }
  } catch (e) { /* ignore */ }
});

// ============================================================
// PASTE PANEL — load/parse/validate JSON pasted from Barry/Claude
// ============================================================
function togglePastePanel() {
  const panel = document.getElementById('paste-panel');
  const toggle = document.getElementById('paste-toggle');
  panel.classList.toggle('collapsed');
  toggle.textContent = panel.classList.contains('collapsed') ? '+' : '−';
}

function showStatus(type, msg) {
  const el = document.getElementById('paste-status');
  el.className = 'paste-status show ' + type;
  el.textContent = msg;
  if (type === 'ok' || type === 'info') {
    setTimeout(() => { el.classList.remove('show'); }, 4000);
  }
}

function parseSlidesInput(raw) {
  if (!raw || !raw.trim()) {
    showStatus('err', 'Paste box is empty.');
    return null;
  }

  let text = raw.trim();

  // Strip "const SLIDES = " wrapper if present
  text = text.replace(/^\s*(const|let|var)\s+SLIDES\s*=\s*/, '');
  // Strip trailing semicolon
  text = text.replace(/;\s*$/, '');
  // Strip code fences if Claude/ChatGPT added them
  text = text.replace(/^```(?:json|javascript|js)?\s*/i, '').replace(/```\s*$/, '');
  text = text.trim();

  // Normalize smart quotes that might come from a non-code paste source
  text = text
    .replace(/[\u201C\u201D]/g, '"')
    .replace(/[\u2018\u2019]/g, "'");

  // Try strict JSON first
  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e1) {
    // Fall back to JS object parsing (handles unquoted keys, single quotes, etc.)
    try {
      parsed = (new Function('return (' + text + ')'))();
    } catch (e2) {
      showStatus('err', 'Could not parse — looks like invalid JSON. Most common cause: smart quotes or missing commas. Error: ' + e2.message);
      return null;
    }
  }

  // Validate structure
  if (!parsed || typeof parsed !== 'object') {
    showStatus('err', 'Parsed value is not an object.');
    return null;
  }
  if (!parsed.hook || !parsed.hook.headline) {
    showStatus('err', 'Missing required field: hook.headline');
    return null;
  }
  // Prompt count is flexible — 3 is the minimum for a coherent arc, 15 is the upper sanity cap.
  // Remember to update hook.headline ("7 Claude Prompts" → "3 Claude Prompts") to match your chosen count.
  if (!Array.isArray(parsed.prompts) || parsed.prompts.length < 3 || parsed.prompts.length > 15) {
    showStatus('err', `Need between 3 and 15 prompts. Got ${parsed.prompts ? parsed.prompts.length : 0}.`);
    return null;
  }
  for (let i = 0; i < parsed.prompts.length; i++) {
    if (!parsed.prompts[i].title || !parsed.prompts[i].prompt) {
      showStatus('err', `Prompt #${i+1} is missing 'title' or 'prompt' field.`);
      return null;
    }
  }
  if (!parsed.cta || !parsed.cta.headline) {
    showStatus('err', 'Missing required field: cta.headline');
    return null;
  }
  if (!parsed.attribution) {
    parsed.attribution = '@KIRO.APP'; // default
  }

  // Platform is REQUIRED — controls whether prompts render in a ChatGPT or Claude chat box
  if (!parsed.platform) {
    showStatus('err', 'Missing required field: platform. Must be "chatgpt" or "claude".');
    return null;
  }
  if (parsed.platform !== 'chatgpt' && parsed.platform !== 'claude') {
    showStatus('err', `Unknown platform: "${parsed.platform}". Must be "chatgpt" or "claude".`);
    return null;
  }

  // Mascot is OPTIONAL but if present, validate it matches a known mascot key
  if (parsed.mascot !== undefined) {
    if (typeof parsed.mascot !== 'string' || !MASCOTS[parsed.mascot]) {
      const available = Object.keys(MASCOTS).join(', ');
      showStatus('err', `Unknown mascot: "${parsed.mascot}". Must be one of: ${available}`);
      return null;
    }
  }

  // Path context is OPTIONAL but if present, validate the pathKey matches a known path
  if (parsed.pathContext) {
    if (!parsed.pathContext.pathKey) {
      showStatus('err', 'pathContext is set but missing pathKey.');
      return null;
    }
    if (!PATHS[parsed.pathContext.pathKey]) {
      const available = Object.keys(PATHS).join(', ');
      showStatus('err', `Unknown pathKey: "${parsed.pathContext.pathKey}". Must be one of: ${available}`);
      return null;
    }
  }

  return parsed;
}

function loadPastedSlides() {
  const raw = document.getElementById('paste-input').value;
  const parsed = parseSlidesInput(raw);
  if (!parsed) return;

  // Update SLIDES and re-render
  Object.keys(SLIDES).forEach(k => delete SLIDES[k]);
  Object.assign(SLIDES, parsed);
  rerender();

  // Persist
  try { localStorage.setItem('kiro_slides_json', raw); } catch(e) {}

  showStatus('ok', '✓ Rendered. Scroll to review, then click ⬇ Download.');
}

function resetSlides() {
  if (!confirm('Reset to the default slideshow? This will clear your pasted JSON.')) return;
  try { localStorage.removeItem('kiro_slides_json'); } catch(e) {}
  document.getElementById('paste-input').value = '';
  showStatus('info', 'Reset. Refresh the page to fully reload defaults.');
}

function rerender() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  render();
}

// ============================================================
// DOWNLOAD ALL SLIDES — one-click export to 1080x1920 PNGs
// ============================================================
function loadHtml2Canvas() {
  return new Promise((resolve, reject) => {
    if (window.html2canvas) return resolve(window.html2canvas);
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = () => resolve(window.html2canvas);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function downloadAllSlides() {
  const btn = document.getElementById('dl-btn');
  const originalText = btn.textContent;
  btn.disabled = true;

  try {
    btn.textContent = 'Loading...';
    const html2canvas = await loadHtml2Canvas();

    // Hide the safe zone overlay if it's on, and the HUD itself, during capture
    const safeWasOn = document.body.classList.contains('show-safezone');
    if (safeWasOn) document.body.classList.remove('show-safezone');
    document.querySelector('.hud').style.visibility = 'hidden';

    // Generate a date-based prefix so successive downloads don't collide
    const now = new Date();
    const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;

    const slides = document.querySelectorAll('.slide');
    for (let i = 0; i < slides.length; i++) {
      btn.textContent = `Capturing ${i+1} / ${slides.length}...`;
      const canvas = await html2canvas(slides[i], {
        width: 1080,
        height: 1920,
        scale: 1,
        useCORS: true,
        backgroundColor: '#000000',
      });
      const dataUrl = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = `kiro_${stamp}_slide_${String(i+1).padStart(2,'0')}.png`;
      link.click();
      // Tiny delay so the browser doesn't block consecutive downloads
      await new Promise(r => setTimeout(r, 300));
    }

    if (safeWasOn) document.body.classList.add('show-safezone');
    document.querySelector('.hud').style.visibility = 'visible';
    btn.textContent = '✓ Done — check Downloads folder';
    setTimeout(() => { btn.textContent = originalText; btn.disabled = false; }, 3000);
  } catch (err) {
    console.error(err);
    document.querySelector('.hud').style.visibility = 'visible';
    btn.textContent = '✗ Failed — check console';
    setTimeout(() => { btn.textContent = originalText; btn.disabled = false; }, 3000);
  }
}
</script>
</body>
</html>
